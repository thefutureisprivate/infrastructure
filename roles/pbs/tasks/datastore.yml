---
- name: 'List PBS S3 endpoints'
  ansible.builtin.command:
    argv:
      - 'proxmox-backup-manager'
      - 's3'
      - 'endpoint'
      - 'list'
      - '--output-format'
      - 'json'
  register: 'pbs_s3_endpoint_list_result'
  changed_when: false

- name: 'Parse PBS S3 endpoints'
  ansible.builtin.set_fact:
    pbs_s3_endpoint_list: '{{ pbs_s3_endpoint_list_result.stdout | from_json }}'

- name: 'Find PBS S3 endpoint'
  ansible.builtin.set_fact:
    pbs_s3_endpoint_matches: "{{
        (pbs_s3_endpoint_list
          | selectattr('id', 'defined')
          | selectattr('id', 'equalto', 'hetzner-fsn1')
          | list)
        +
        (pbs_s3_endpoint_list
          | selectattr('name', 'defined')
          | selectattr('name', 'equalto', 'hetzner-fsn1')
          | list)
      }}"

- name: 'Create PBS S3 endpoint'
  ansible.builtin.command:
    argv:
      - 'proxmox-backup-manager'
      - 's3'
      - 'endpoint'
      - 'create'
      - 'hetzner-fsn1'
      - '--access-key'
      - '{{ pbs_s3_access_key }}'
      - '--secret-key'
      - '{{ pbs_s3_secret_key }}'
      - '--endpoint'
      - 'fsn1.your-objectstorage.com'
      - '--region'
      - 'fsn1'
  changed_when: true
  no_log: true
  when: 'pbs_s3_endpoint_matches | length == 0'

- name: 'Create PBS S3 datastore cache directory'
  ansible.builtin.file:
    path: '/var/lib/pbs'
    state: 'directory'
    owner: 'backup'
    group: 'backup'
    mode: '0750'

- name: 'List PBS datastores'
  ansible.builtin.command:
    argv:
      - 'proxmox-backup-manager'
      - 'datastore'
      - 'list'
      - '--output-format'
      - 'json'
  register: 'pbs_datastore_list_result'
  changed_when: false

- name: 'Parse PBS datastores'
  ansible.builtin.set_fact:
    pbs_datastore_list: '{{ pbs_datastore_list_result.stdout | from_json }}'

- name: 'Find PBS S3 datastore'
  ansible.builtin.set_fact:
    pbs_s3_datastore_matches: "{{
        (pbs_datastore_list
          | selectattr('name', 'defined')
          | selectattr('name', 'equalto', 'backup')
          | list)
        +
        (pbs_datastore_list
          | selectattr('store', 'defined')
          | selectattr('store', 'equalto', 'backup')
          | list)
      }}"

- name: 'Build PBS S3 datastore creation command'
  ansible.builtin.set_fact:
    pbs_s3_datastore_create_argv: "{{
        ['proxmox-backup-manager',
          'datastore',
          'create',
          'backup',
          '/var/lib/pbs',
          '--backend',
          'type=s3,client=hetzner-fsn1,bucket=' ~ pbs_s3_datastore_bucket]
      }}"

- name: 'Create PBS S3 datastore'
  ansible.builtin.command:
    argv: '{{ pbs_s3_datastore_create_argv }}'
  changed_when: true
  when: 'pbs_s3_datastore_matches | length == 0'

- name: 'Set PBS S3 datastore retention configuration'
  ansible.builtin.set_fact:
    pbs_s3_retention: '{{ pbs_s3_datastore_retention | default({}) }}'

- name: 'Assert PBS S3 datastore retention variables are supported'
  ansible.builtin.assert:
    that:
      - 'pbs_s3_retention is mapping'
      - 'pbs_s3_retention.keys() | list | difference(pbs_retention_keys) | length == 0'
    fail_msg: 'Use only supported PBS retention keys in pbs_s3_datastore_retention.'
  vars:
    pbs_retention_keys:
      - 'keep-last'
      - 'keep-hourly'
      - 'keep-daily'
      - 'keep-weekly'
      - 'keep-monthly'
      - 'keep-yearly'

- name: 'Show PBS S3 datastore configuration'
  ansible.builtin.command:
    argv:
      - 'proxmox-backup-manager'
      - 'datastore'
      - 'show'
      - 'backup'
      - '--output-format'
      - 'json'
  register: 'pbs_s3_datastore_show_result'
  changed_when: false

- name: 'Parse PBS S3 datastore configuration'
  ansible.builtin.set_fact:
    pbs_s3_datastore_config: '{{ pbs_s3_datastore_show_result.stdout | from_json }}'

- name: 'Initialize PBS S3 datastore policy update command'
  ansible.builtin.set_fact:
    pbs_s3_datastore_policy_update_argv:
      - 'proxmox-backup-manager'
      - 'datastore'
      - 'update'
      - 'backup'
    pbs_s3_datastore_policy_update_needed: false

- name: 'Add PBS S3 datastore garbage collection schedule update'
  ansible.builtin.set_fact:
    pbs_s3_datastore_policy_update_argv: "{{
        pbs_s3_datastore_policy_update_argv
        + ['--gc-schedule', 'daily']
      }}"
    pbs_s3_datastore_policy_update_needed: true
  when: '(pbs_s3_datastore_config[''gc-schedule''] | default('''')) != ''daily'''

- name: 'Add PBS S3 datastore prune schedule update'
  ansible.builtin.set_fact:
    pbs_s3_datastore_policy_update_argv: "{{
        pbs_s3_datastore_policy_update_argv
        + ['--prune-schedule', 'daily']
      }}"
    pbs_s3_datastore_policy_update_needed: true
  when: '(pbs_s3_datastore_config[''prune-schedule''] | default('''')) != ''daily'''

- name: 'Add PBS S3 datastore retention updates'
  ansible.builtin.set_fact:
    pbs_s3_datastore_policy_update_argv: "{{
        pbs_s3_datastore_policy_update_argv
        + ['--' ~ item.key, item.value | string]
      }}"
    pbs_s3_datastore_policy_update_needed: true
  loop: '{{ pbs_s3_retention | dict2items }}'
  when: "
    (pbs_s3_datastore_config[item.key] | default('') | string)
    != (item.value | string)
    "

- name: 'Update PBS S3 datastore policy'
  ansible.builtin.command:
    argv: '{{ pbs_s3_datastore_policy_update_argv }}'
  changed_when: true
  when: 'pbs_s3_datastore_policy_update_needed'

- name: 'List PBS verification jobs'
  ansible.builtin.command:
    argv:
      - 'proxmox-backup-manager'
      - 'verify-job'
      - 'list'
      - '--output-format'
      - 'json'
  register: 'pbs_verify_job_list_result'
  changed_when: false

- name: 'Parse PBS verification jobs'
  ansible.builtin.set_fact:
    pbs_verify_job_list: '{{ pbs_verify_job_list_result.stdout | from_json }}'

- name: 'Find PBS S3 verification job'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_matches: "{{
        (pbs_verify_job_list
          | selectattr('id', 'defined')
          | selectattr('id', 'equalto', 'verify-backup')
          | list)
        +
        (pbs_verify_job_list
          | selectattr('name', 'defined')
          | selectattr('name', 'equalto', 'verify-backup')
          | list)
      }}"

- name: 'Build PBS S3 verification job creation command'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_create_argv: "{{
        ['proxmox-backup-manager',
          'verify-job',
          'create',
          'verify-backup',
          '--store',
          'backup',
          '--schedule',
          'daily',
          '--ignore-verified',
          'true']
        +
        (['--outdated-after', pbs_s3_verify_outdated_after | string]
          if pbs_s3_verify_outdated_after is defined
          else [])
      }}"

- name: 'Create PBS S3 verification job'
  ansible.builtin.command:
    argv: '{{ pbs_s3_verify_job_create_argv }}'
  changed_when: true
  when: 'pbs_s3_verify_job_matches | length == 0'

- name: 'Show PBS S3 verification job'
  ansible.builtin.command:
    argv:
      - 'proxmox-backup-manager'
      - 'verify-job'
      - 'show'
      - 'verify-backup'
      - '--output-format'
      - 'json'
  register: 'pbs_s3_verify_job_show_result'
  changed_when: false
  when: 'pbs_s3_verify_job_matches | length > 0'

- name: 'Parse PBS S3 verification job'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_config: '{{ pbs_s3_verify_job_show_result.stdout | from_json }}'
  when: 'pbs_s3_verify_job_matches | length > 0'

- name: 'Initialize PBS S3 verification job update command'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_update_argv:
      - 'proxmox-backup-manager'
      - 'verify-job'
      - 'update'
      - 'verify-backup'
    pbs_s3_verify_job_update_needed: false
  when: 'pbs_s3_verify_job_matches | length > 0'

- name: 'Add PBS S3 verification job store update'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_update_argv: "{{
        pbs_s3_verify_job_update_argv
        + ['--store', 'backup']
      }}"
    pbs_s3_verify_job_update_needed: true
  when:
    - 'pbs_s3_verify_job_matches | length > 0'
    - '(pbs_s3_verify_job_config[''store''] | default('''')) != ''backup'''

- name: 'Add PBS S3 verification job schedule update'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_update_argv: "{{
        pbs_s3_verify_job_update_argv
        + ['--schedule', 'daily']
      }}"
    pbs_s3_verify_job_update_needed: true
  when:
    - 'pbs_s3_verify_job_matches | length > 0'
    - '(pbs_s3_verify_job_config[''schedule''] | default('''')) != ''daily'''

- name: 'Add PBS S3 verification job ignore-verified update'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_update_argv: "{{
        pbs_s3_verify_job_update_argv
        + ['--ignore-verified', 'true']
      }}"
    pbs_s3_verify_job_update_needed: true
  when:
    - 'pbs_s3_verify_job_matches | length > 0'
    - 'not (pbs_s3_verify_job_config[''ignore-verified''] | default(true) | bool)'

- name: 'Add PBS S3 verification job outdated-after update'
  ansible.builtin.set_fact:
    pbs_s3_verify_job_update_argv: "{{
        pbs_s3_verify_job_update_argv
        + ['--outdated-after', pbs_s3_verify_outdated_after | string]
      }}"
    pbs_s3_verify_job_update_needed: true
  when:
    - 'pbs_s3_verify_job_matches | length > 0'
    - 'pbs_s3_verify_outdated_after is defined'
    - "
      (pbs_s3_verify_job_config['outdated-after'] | default('') | string)
      != (pbs_s3_verify_outdated_after | string)
      "

- name: 'Update PBS S3 verification job'
  ansible.builtin.command:
    argv: '{{ pbs_s3_verify_job_update_argv }}'
  changed_when: true
  when:
    - 'pbs_s3_verify_job_matches | length > 0'
    - 'pbs_s3_verify_job_update_needed'
