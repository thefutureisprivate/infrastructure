---
- name: 'Assert supported Debian release for PBS repository'
  ansible.builtin.assert:
    that:
      - 'ansible_facts[''os_family''] == ''Debian'''
      - 'ansible_facts[''distribution_release''] == ''trixie'''
    fail_msg: 'PBS repository setup supports only Debian trixie targets.'

- name: 'Create PBS repository key directory'
  ansible.builtin.file:
    path: '/usr/share/keyrings'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Download PBS repository signing key'
  ansible.builtin.get_url:
    url: 'https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg'
    dest: '/usr/share/keyrings/proxmox-archive-keyring.gpg'
    checksum: 'sha256:136673be77aba35dcce385b28737689ad64fd785a797e57897589aed08db6e45'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: 'Configure PBS no-subscription repository'
  ansible.builtin.copy:
    dest: '/etc/apt/sources.list.d/proxmox.sources'
    src: 'proxmox.sources'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: 'Disable PBS enterprise repository'
  ansible.builtin.copy:
    dest: '/etc/apt/sources.list.d/pbs-enterprise.sources'
    src: 'pbs-enterprise.sources'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: 'Install Proxmox Backup Server'
  ansible.builtin.apt:
    name: 'proxmox-backup-server'
    state: 'present'
    update_cache: true
    cache_valid_time: 3600
