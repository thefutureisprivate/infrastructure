# License: https://github.com/Metropolis-nexus/Common-Files/blob/main/LICENSE

# Filesystem and userspace hardening
dev.tty.ldisc_autoload = 0
fs.binfmt_misc.status = 0
fs.protected_regular = 2
fs.protected_fifos = 2
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.suid_dumpable = 0

# Kernel information exposure and attack-surface reduction
kernel.core_pattern = |/bin/false
kernel.dmesg_restrict = 1
kernel.io_uring_disabled = 2
kernel.kexec_load_disabled = 1
kernel.kptr_restrict = 2
kernel.oops_limit = 100
kernel.warn_limit = 100
kernel.panic = -1
kernel.perf_event_paranoid = 4
kernel.printk = 3 3 3 3
kernel.randomize_va_space = 2
kernel.sysrq = 0
kernel.unprivileged_bpf_disabled = 1
kernel.unprivileged_userns_clone = 1
kernel.yama.ptrace_scope = 3
net.core.bpf_jit_harden = 2

# Network hardening and desktop privacy
net.ipv4.conf.*.accept_redirects = 0
net.ipv4.conf.*.accept_source_route = 0
net.ipv4.conf.*.arp_filter = 1
net.ipv4.conf.*.arp_ignore = 2
net.ipv4.conf.*.rp_filter = 1
net.ipv4.conf.*.send_redirects = 0
net.ipv4.conf.*.shared_media = 0
net.ipv4.conf.all.drop_gratuitous_arp = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.log_martians = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.icmp_echo_ignore_all = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.ip_forward = 1
net.ipv4.tcp_dsack = 0
net.ipv4.tcp_rfc1337 = 1
net.ipv4.tcp_sack = 0
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_timestamps = 0
net.ipv6.conf.*.accept_redirects = 0
net.ipv6.conf.*.accept_source_route = 0
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2
net.ipv6.icmp.echo_ignore_all = 1

# Memory hardening
vm.mmap_min_addr = 65536
vm.mmap_rnd_bits = 32
vm.mmap_rnd_compat_bits = 16
vm.max_map_count = 1048576
vm.unprivileged_userfaultfd = 0
