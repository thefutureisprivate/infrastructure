---
- name: 'Configure module blacklist drop-ins'
  block:
    - name: 'Copy modprobe blacklist drop-in file'
      ansible.builtin.copy:
        owner: 'root'
        group: 'root'
        mode: '0644'
        src: 'modprobed-blacklist.conf'
        dest: '/etc/modprobe.d/99-hardening-blacklist.conf'

    - name: 'Copy framebuffer blacklist drop-in file'
      ansible.builtin.copy:
        owner: 'root'
        group: 'root'
        mode: '0644'
        src: 'modprobed-framebuffer-blacklist.conf'
        dest: '/etc/modprobe.d/framebuffer-blacklist.conf'

- name: 'Copy server sysctl drop-in file'
  ansible.builtin.copy:
    owner: 'root'
    group: 'root'
    mode: '0644'
    src: 'sysctld-server.conf'
    dest: '/etc/sysctl.d/99-server.conf'
  when: '''servers'' in group_names'

- name: 'Copy desktop sysctl drop-in file'
  ansible.builtin.copy:
    owner: 'root'
    group: 'root'
    mode: '0644'
    src: 'sysctld-desktop.conf'
    dest: '/etc/sysctl.d/99-desktop.conf'
  when: '''desktops'' in group_names'

- name: 'Create /etc/udev/rules.d'
  ansible.builtin.file:
    path: '/etc/udev/rules.d'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Copy binfmt_misc udev rule file'
  ansible.builtin.copy:
    owner: 'root'
    group: 'root'
    mode: '0644'
    src: 'udevd-binfmt-misc.rules'
    dest: '/etc/udev/rules.d/99-hardening-binfmt-misc.rules'
  notify: 'Reload udev rules'

- name: 'Configure kernel command line'
  block:
    - name: 'Check systemd-boot status'
      ansible.builtin.command:
        argv:
          - 'bootctl'
          - 'is-installed'
      register: 'hardening_systemd_boot_check'
      failed_when: false
      changed_when: false

    - name: 'Check /etc/kernel/cmdline'
      ansible.builtin.stat:
        path: '/etc/kernel/cmdline'
      register: 'hardening_systemd_boot_cmdline'

    - name: 'Check Proxmox systemd-boot marker'
      ansible.builtin.stat:
        path: '/etc/kernel/proxmox-boot-uuids'
      register: 'hardening_proxmox_boot_uuids'

    - name: 'Check /etc/default/grub'
      ansible.builtin.stat:
        path: '/etc/default/grub'
      register: 'hardening_grub_default'

    - name: 'Select bootloader configuration target'
      ansible.builtin.set_fact:
        hardening_systemd_boot_available: false
        hardening_systemd_boot_installed: '{{ hardening_systemd_boot_check.rc == 0 }}'
        hardening_proxmox_systemd_boot: '{{ hardening_proxmox_boot_uuids.stat.exists }}'
        hardening_grub_available: '{{ hardening_grub_default.stat.exists }}'
        hardening_cmdline_args: '{{ hardening_kernel_args | unique | list }}'

    - name: 'Enable systemd-boot target'
      ansible.builtin.set_fact:
        hardening_systemd_boot_available: true
      when:
        - 'hardening_systemd_boot_cmdline.stat.exists'
        - 'hardening_systemd_boot_installed | bool or hardening_proxmox_systemd_boot | bool'

    - name: 'Set bootloader type'
      ansible.builtin.set_fact:
        hardening_bootloader_type: 'unsupported'

    - name: 'Select systemd-boot'
      ansible.builtin.set_fact:
        hardening_bootloader_type: 'systemd-boot'
      when: 'hardening_systemd_boot_available | bool'

    - name: 'Select GRUB'
      ansible.builtin.set_fact:
        hardening_bootloader_type: 'grub'
      when:
        - 'not (hardening_systemd_boot_available | bool)'
        - 'hardening_grub_available | bool'

    - name: 'Configure kernel arguments for systemd-boot'
      when: 'hardening_bootloader_type == ''systemd-boot'''
      block:
        - name: 'Read /etc/kernel/cmdline'
          ansible.builtin.slurp:
            src: '/etc/kernel/cmdline'
          register: 'hardening_sdboot_raw'

        - name: 'Build systemd-boot kernel cmdline'
          ansible.builtin.set_fact:
            hardening_sdboot_curr: '{{ hardening_sdboot_raw.content | b64decode | trim }}'

        - name: 'Append required systemd-boot kernel arguments'
          ansible.builtin.set_fact:
            hardening_sdboot_parts: '{{ hardening_sdboot_curr.split() + hardening_cmdline_args }}'

        - name: 'Deduplicate systemd-boot kernel arguments'
          ansible.builtin.set_fact:
            hardening_sdboot_next: '{{ hardening_sdboot_parts | unique | join('' '') }}'

        - name: 'Update /etc/kernel/cmdline'
          ansible.builtin.copy:
            dest: '/etc/kernel/cmdline'
            content: '{{ hardening_sdboot_next }}{{ ''\n'' }}'
            owner: 'root'
            group: 'root'
            mode: '0644'
            backup: true
          register: 'hardening_sdboot_update'
          when: 'hardening_sdboot_curr != hardening_sdboot_next'

        - name: 'Check /usr/sbin/proxmox-boot-tool'
          ansible.builtin.stat:
            path: '/usr/sbin/proxmox-boot-tool'
          register: 'hardening_proxmox_boot_tool_sbin'

        - name: 'Check /usr/bin/proxmox-boot-tool'
          ansible.builtin.stat:
            path: '/usr/bin/proxmox-boot-tool'
          register: 'hardening_proxmox_boot_tool_bin'

        - name: 'Check /usr/sbin/sdbootutil'
          ansible.builtin.stat:
            path: '/usr/sbin/sdbootutil'
          register: 'hardening_sdbootutil_sbin'

        - name: 'Check /usr/bin/sdbootutil'
          ansible.builtin.stat:
            path: '/usr/bin/sdbootutil'
          register: 'hardening_sdbootutil_bin'

        - name: 'Select sdbootutil command'
          ansible.builtin.set_fact:
            hardening_sdbootutil_command: ''

        - name: 'Select Proxmox boot tool command'
          ansible.builtin.set_fact:
            hardening_proxmox_boot_tool_command: ''

        - name: 'Use /usr/sbin/proxmox-boot-tool'
          ansible.builtin.set_fact:
            hardening_proxmox_boot_tool_command: '/usr/sbin/proxmox-boot-tool'
          when: 'hardening_proxmox_boot_tool_sbin.stat.exists'

        - name: 'Use /usr/bin/proxmox-boot-tool'
          ansible.builtin.set_fact:
            hardening_proxmox_boot_tool_command: '/usr/bin/proxmox-boot-tool'
          when:
            - 'hardening_proxmox_boot_tool_command | length == 0'
            - 'hardening_proxmox_boot_tool_bin.stat.exists'

        - name: 'Use /usr/sbin/sdbootutil'
          ansible.builtin.set_fact:
            hardening_sdbootutil_command: '/usr/sbin/sdbootutil'
          when: 'hardening_sdbootutil_sbin.stat.exists'

        - name: 'Use /usr/bin/sdbootutil'
          ansible.builtin.set_fact:
            hardening_sdbootutil_command: '/usr/bin/sdbootutil'
          when:
            - 'hardening_sdbootutil_command | length == 0'
            - 'hardening_sdbootutil_bin.stat.exists'

        - name: 'Refresh Proxmox systemd-boot entries'
          ansible.builtin.command:
            argv:
              - '{{ hardening_proxmox_boot_tool_command }}'
              - 'refresh'
          changed_when: true
          when:
            - 'hardening_sdboot_update.changed'
            - 'hardening_proxmox_boot_tool_command | length > 0'

        - name: 'Update systemd-boot entries'
          ansible.builtin.command:
            argv:
              - '{{ hardening_sdbootutil_command }}'
              - 'update-all-entries'
          changed_when: true
          when:
            - 'hardening_sdboot_update.changed'
            - 'hardening_proxmox_boot_tool_command | length == 0'
            - 'hardening_sdbootutil_command | length > 0'

        - name: 'Report skipped systemd-boot entry regeneration'
          ansible.builtin.debug:
            msg: 'No systemd-boot updater found; entries were not regenerated.'
          when:
            - 'hardening_sdboot_update.changed'
            - 'hardening_proxmox_boot_tool_command | length == 0'
            - 'hardening_sdbootutil_command | length == 0'

    - name: 'Configure kernel arguments for GRUB'
      when: 'hardening_bootloader_type == ''grub'''
      block:
        - name: 'Read /etc/default/grub'
          ansible.builtin.slurp:
            src: '/etc/default/grub'
          register: 'hardening_grub_default_content'

        - name: 'Parse GRUB kernel cmdline'
          ansible.builtin.set_fact:
            hardening_grub_text: '{{ hardening_grub_default_content.content | b64decode }}'
            hardening_grub_re: '(?m)^GRUB_CMDLINE_LINUX_DEFAULT="([^"]*)"'

        - name: 'Find GRUB kernel cmdline'
          ansible.builtin.set_fact:
            hardening_grub_matches: '{{ hardening_grub_text | regex_findall(hardening_grub_re) }}'

        - name: 'Build GRUB kernel cmdline'
          ansible.builtin.set_fact:
            hardening_grub_current: '{{ (hardening_grub_matches | first) | default('''') }}'

        - name: 'Append required GRUB kernel arguments'
          ansible.builtin.set_fact:
            hardening_grub_parts: '{{ hardening_grub_current.split() + hardening_cmdline_args }}'

        - name: 'Deduplicate GRUB kernel arguments'
          ansible.builtin.set_fact:
            hardening_grub_next: '{{ hardening_grub_parts | unique | join('' '') }}'

        - name: 'Update GRUB_CMDLINE_LINUX_DEFAULT'
          ansible.builtin.lineinfile:
            path: '/etc/default/grub'
            regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
            line: 'GRUB_CMDLINE_LINUX_DEFAULT="{{ hardening_grub_next }}"'
            backup: true
          register: 'hardening_grub_update'
          when: 'hardening_grub_current != hardening_grub_next'

        - name: 'Regenerate Debian GRUB configuration'
          ansible.builtin.command:
            argv:
              - 'update-grub'
          changed_when: true
          when:
            - 'hardening_grub_update.changed'
            - 'ansible_facts[''os_family''] == ''Debian'''

        - name: 'Set GRUB configuration output path'
          ansible.builtin.set_fact:
            hardening_grub_config_output: '/boot/grub2/grub.cfg'
          when: 'ansible_facts[''os_family''] != ''Debian'''

        - name: 'Set Debian GRUB configuration output path'
          ansible.builtin.set_fact:
            hardening_grub_config_output: '/boot/grub/grub.cfg'
          when: 'ansible_facts[''os_family''] == ''Debian'''

        - name: 'Regenerate GRUB2 configuration'
          ansible.builtin.command:
            argv:
              - 'grub2-mkconfig'
              - '-o'
              - '{{ hardening_grub_config_output }}'
          changed_when: true
          when:
            - 'hardening_grub_update.changed'
            - 'ansible_facts[''os_family''] != ''Debian'''

    - name: 'Fail when no supported bootloader configuration was found'
      ansible.builtin.fail:
        msg: 'No supported systemd-boot or GRUB configuration file was found.'
      when: 'hardening_bootloader_type == ''unsupported'''
