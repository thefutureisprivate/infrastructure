---
name: 'Lint'

'on':
  pull_request: {}
  push:
    branches:
      - 'main'
  workflow_dispatch: {}

permissions:
  contents: 'read'

jobs:
  validate:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
      - name: 'Create Python virtual environment'
        run: 'python3 -m venv .venv'
      - name: 'Install validation tools'
        run: '.venv/bin/python -m pip install --upgrade pip ansible-core ansible-lint yamllint'
      - name: 'Install Ansible collections'
        run: '.venv/bin/ansible-galaxy collection install -r requirements.yml'
      - name: 'Run yamllint'
        run: '.venv/bin/yamllint .'
      - name: 'Run ansible-lint'
        run: '.venv/bin/ansible-lint site.yml roles/dns'
      - name: 'Run Ansible syntax check'
        run: '.venv/bin/ansible-playbook -i inventory.yml --syntax-check site.yml'
