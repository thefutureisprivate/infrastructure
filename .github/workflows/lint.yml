---
name: 'Lint'

'on':
  pull_request: {}
  push:
    branches:
      - 'main'
  workflow_dispatch: {}

permissions:
  contents: 'read'

jobs:
  validate:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
      - name: 'Create Python virtual environment'
        run: 'python3 -m venv /tmp/infrastructure-lint-venv'
      - name: 'Install validation tools'
        run: '/tmp/infrastructure-lint-venv/bin/python -m pip install --upgrade pip ansible-core ansible-lint yamllint'
      - name: 'Install Ansible collections'
        run: '/tmp/infrastructure-lint-venv/bin/ansible-galaxy collection install -r requirements.yml'
      - name: 'Run yamllint'
        run: '/tmp/infrastructure-lint-venv/bin/yamllint .'
      - name: 'Run ansible-lint'
        run: '/tmp/infrastructure-lint-venv/bin/ansible-lint site.yml roles/dns'
      - name: 'Run Ansible syntax check'
        run: '/tmp/infrastructure-lint-venv/bin/ansible-playbook -i inventory.yml --syntax-check site.yml'
