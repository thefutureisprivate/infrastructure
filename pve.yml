---
- name: 'Setup Proxmox Virtual Environment'
  hosts: 'pve'
  become: true
  tasks:
    - name: 'Set hostname to inventory hostname'
      ansible.builtin.hostname:
        name: '{{ inventory_hostname }}'

    - name: 'Run pve role'
      ansible.builtin.include_role:
        name: 'pve'
      tags:
        - 'always'
